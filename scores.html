<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>High Scores — Spirlini Memory</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #180003;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; flex-direction: column; align-items: center;
      padding: 0 0 56px;
      color: #fff;
    }

    /* Header */
    .header {
      width: 100%; background: #F40009;
      padding: 14px 20px 10px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 28px;
      position: relative; overflow: hidden;
    }
    .header::after {
      content: ''; position: absolute;
      bottom: -1px; left: 0; right: 0; height: 14px;
      background: #180003;
      clip-path: ellipse(52% 100% at 50% 100%);
    }
    .header-inner {
      width: 100%; max-width: 560px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .logo {
      font-family: 'Pacifico', cursive;
      font-size: 1.5rem; color: #fff;
      text-shadow: 1px 1px 3px rgba(0,0,0,.3);
    }
    .nav-back {
      display: inline-flex; align-items: center; gap: 6px;
      color: rgba(255,255,255,.85); text-decoration: none;
      font-size: .85rem; font-weight: 700;
      background: rgba(255,255,255,.18);
      padding: 6px 12px; border-radius: 100px;
      transition: background .2s;
    }
    .nav-back:hover { background: rgba(255,255,255,.3); }

    h1 {
      font-family: 'Pacifico', cursive;
      font-size: 1.8rem; font-weight: 400;
      margin-bottom: 6px; letter-spacing: .3px;
    }
    h1 span { color: #F40009; }
    .subtitle { font-size: .88rem; color: rgba(255,255,255,.4); margin-bottom: 28px; }

    .list { width: 100%; max-width: 560px; padding: 0 16px; }

    .score-row {
      display: grid;
      grid-template-columns: 48px 1fr auto;
      grid-template-rows: auto auto;
      column-gap: 12px; row-gap: 2px;
      align-items: center;
      background: #280008;
      border: 1.5px solid rgba(255,255,255,.07);
      border-radius: 16px; padding: 14px 16px; margin-bottom: 10px;
      transition: border-color .2s;
    }
    .score-row.mine {
      border-color: rgba(244,0,9,.45);
      background: rgba(244,0,9,.07);
    }

    .rank { grid-row: 1/3; font-size: 1.5rem; text-align: center; line-height: 1; }
    .rank.number { font-size: 1rem; font-weight: 800; color: rgba(255,255,255,.3); }

    .player-name { font-weight: 700; font-size: .97rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .score-row.mine .player-name { color: #F40009; }

    .score-date { font-size: .73rem; color: rgba(255,255,255,.28); grid-column: 2; grid-row: 2; }

    .pills { grid-column: 3; grid-row: 1/3; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .pill { display: inline-block; border-radius: 100px; padding: 3px 10px; font-size: .78rem; white-space: nowrap; }
    .pill-moves { background: rgba(244,0,9,.15); color: #F40009; font-weight: 700; }
    .pill-time  { background: rgba(255,255,255,.07); color: rgba(255,255,255,.55); }

    .no-scores { text-align: center; color: rgba(255,255,255,.3); padding: 56px 0; font-size: .95rem; }
    .no-scores .big { font-size: 3rem; margin-bottom: 12px; }

    .actions { margin-top: 28px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .btn {
      padding: 12px 28px; border-radius: 100px;
      font-size: .93rem; font-weight: 800; cursor: pointer; border: none;
      transition: background .2s, transform .1s;
      text-decoration: none; display: inline-block;
    }
    .btn:active { transform: scale(.97); }
    .btn-red { background: #F40009; color: #fff; box-shadow: 0 4px 14px rgba(244,0,9,.35); }
    .btn-red:hover { background: #b80007; }
    .btn-ghost { background: rgba(255,255,255,.08); color: rgba(255,255,255,.55); }
    .btn-ghost:hover { background: rgba(255,255,255,.14); color: #fff; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-inner">
      <a href="index.html" class="nav-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
        Back
      </a>
      <div class="logo">Spirlini Memory</div>
      <div style="width:70px"></div>
    </div>
  </div>

  <h1>High <span>Scores</span></h1>
  <p class="subtitle">Ranked by fewest moves, then fastest time</p>

  <div class="list" id="scoresList"></div>

  <div class="actions">
    <a href="index.html" class="btn btn-red">Play Again</a>
    <button class="btn btn-ghost" id="clearBtn">Clear My Scores</button>
  </div>

  <script>
    function formatTime(s) { return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }
    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    const currentUser = localStorage.getItem('memoryUser') || '';

    function renderScores() {
      const scores = JSON.parse(localStorage.getItem('memoryScores') || '[]');
      scores.sort((a,b) => a.moves - b.moves || a.seconds - b.seconds);
      const list = document.getElementById('scoresList');
      if (scores.length === 0) {
        list.innerHTML = `<div class="no-scores"><div class="big">🏆</div>No scores yet — play a game!</div>`;
        return;
      }
      const medals = ['🥇','🥈','🥉'];
      list.innerHTML = scores.slice(0,50).map((s,i) => `
        <div class="score-row ${s.name===currentUser?'mine':''}">
          <div class="rank ${i>=3?'number':''}">${i<3?medals[i]:`#${i+1}`}</div>
          <div class="player-name">${escHtml(s.name)}</div>
          <div class="score-date">${escHtml(s.date)}</div>
          <div class="pills">
            <span class="pill pill-moves">${s.moves} moves</span>
            <span class="pill pill-time">${formatTime(s.seconds)}</span>
          </div>
        </div>`).join('');
    }

    document.getElementById('clearBtn').addEventListener('click', () => {
      if (!currentUser) return;
      const kept = JSON.parse(localStorage.getItem('memoryScores') || '[]').filter(s => s.name !== currentUser);
      localStorage.setItem('memoryScores', JSON.stringify(kept));
      renderScores();
    });

    renderScores();
  </script>
</body>
</html>

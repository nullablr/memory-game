<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboard 🇿🇦 Spirlini Memory</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #051008;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; flex-direction: column; align-items: center;
      padding: 0 0 56px; color: #fff;
    }

    /* SA Flag Header */
    .header {
      width: 100%; position: relative;
      overflow: hidden; margin-bottom: 0;
    }
    .flag-bands {
      width: 100%; height: 72px;
      background: #000;
      position: relative;
    }
    .header-inner {
      position: absolute; top:0; left:0; right:0; bottom:0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 20px; max-width: 560px; margin: 0 auto;
      left:50%; transform:translateX(-50%); width:100%;
    }
    .logo {
      font-family: 'Pacifico', cursive;
      font-size: 1.4rem; color: #fff;
      text-shadow: 1px 1px 0 rgba(0,0,0,.5);
      display: flex; align-items: center; gap: 7px;
    }
    .nav-back {
      display: inline-flex; align-items: center; gap: 6px;
      color: #fff; text-decoration: none;
      font-size: .82rem; font-weight: 700;
      background: rgba(0,0,0,.3); padding: 5px 12px;
      border-radius: 100px; transition: background .2s;
    }
    .nav-back:hover { background: rgba(0,0,0,.5); }

    .big5-strip {
      width: 100%;
      background: rgba(0,122,77,.18);
      border-bottom: 1px solid rgba(255,182,18,.2);
      padding: 6px 0; text-align: center;
      font-size: 1.2rem; letter-spacing: 12px; margin-bottom: 24px;
    }

    h1 {
      font-family: 'Pacifico', cursive;
      font-size: 1.8rem; font-weight: 400; margin-bottom: 4px;
    }
    h1 span { color: #FFB612; }
    .subtitle { font-size: .85rem; color: rgba(255,255,255,.38); margin-bottom: 24px; }

    .list { width: 100%; max-width: 560px; padding: 0 16px; }

    .score-row {
      display: grid;
      grid-template-columns: 48px 1fr auto;
      grid-template-rows: auto auto;
      column-gap: 12px; row-gap: 2px; align-items: center;
      background: #0a1f0f;
      border: 1.5px solid rgba(255,255,255,.07);
      border-radius: 16px; padding: 14px 16px; margin-bottom: 10px;
    }
    .score-row.mine {
      border-color: rgba(255,182,18,.45);
      background: rgba(255,182,18,.05);
    }
    .rank { grid-row:1/3; font-size:1.5rem; text-align:center; line-height:1; }
    .rank.number { font-size:1rem; font-weight:800; color:rgba(255,255,255,.3); }
    .player-name { font-weight:700; font-size:.95rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .score-row.mine .player-name { color: #FFB612; }
    .score-date { font-size:.72rem; color:rgba(255,255,255,.28); grid-column:2; grid-row:2; }
    .pills { grid-column:3; grid-row:1/3; display:flex; flex-direction:column; align-items:flex-end; gap:4px; }
    .pill { display:inline-block; border-radius:100px; padding:3px 10px; font-size:.78rem; white-space:nowrap; }
    .pill-moves { background:rgba(0,122,77,.2); color:#4dda96; font-weight:700; }
    .pill-time  { background:rgba(255,255,255,.07); color:rgba(255,255,255,.55); }

    .no-scores { text-align:center; color:rgba(255,255,255,.3); padding:56px 0; font-size:.95rem; }
    .no-scores .big { font-size:3rem; margin-bottom:12px; }

    .actions { margin-top:28px; display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
    .btn {
      padding:12px 28px; border-radius:100px;
      font-size:.93rem; font-weight:800; cursor:pointer; border:none;
      transition:background .2s, transform .1s;
      text-decoration:none; display:inline-block;
    }
    .btn:active { transform:scale(.97); }
    .btn-green { background:#007A4D; color:#fff; box-shadow:0 4px 14px rgba(0,122,77,.4); }
    .btn-green:hover { background:#005c39; }
    .btn-ghost { background:rgba(255,255,255,.08); color:rgba(255,255,255,.55); }
    .btn-ghost:hover { background:rgba(255,255,255,.14); color:#fff; }

    .footer-ubuntu {
      margin-top:24px; font-size:.7rem;
      color:rgba(255,255,255,.2); letter-spacing:.08em; text-align:center;
    }
    .footer-ubuntu span { color:rgba(255,182,18,.4); }
  </style>
</head>
<body>

  <div class="header">
    <div class="flag-bands"></div>
    <div class="header-inner">
      <a href="index.html" class="nav-back">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
        Back
      </a>
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3 2" width="32" height="21" style="border-radius:3px;flex-shrink:0;display:block">
          <rect width="3" height="2" fill="#002395"/>
          <rect width="3" height="1" fill="#DE3831"/>
          <rect y="0.75" width="3" height="0.5" fill="#fff"/>
          <rect y="0.85" width="3" height="0.3" fill="#007A4D"/>
          <polygon points="0,0 0,2 1.3,1" fill="#FFB612"/>
          <polygon points="0,0 0,2 1.1,1" fill="#000"/>
          <polygon points="0,0.75 0,1.25 1.1,1" fill="#fff"/>
          <polygon points="0,0.85 0,1.15 1.0,1" fill="#007A4D"/>
        </svg>
        Spirlini Memory
      </div>
      <div style="width:60px"></div>
    </div>
  </div>

  <div class="big5-strip">🦁 🐘 🦏 🐃 🐆</div>

  <h1>Leader<span>board</span></h1>
  <p class="subtitle">Ranked by fewest moves, then fastest time 🌿</p>

  <div class="list" id="scoresList"></div>

  <div class="actions">
    <a href="index.html" class="btn btn-green">🔄 Play Again</a>
    <button class="btn btn-ghost" id="clearBtn">Clear My Scores</button>
  </div>

  <div class="footer-ubuntu"><span>Ubuntu</span> — "I am because we are" &nbsp;·&nbsp; 🇿🇦 South Africa</div>

  <script>
    function formatTime(s){return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}
    function escHtml(str){
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    const currentUser=localStorage.getItem('memoryUser')||'';

    function renderScores(){
      const scores=JSON.parse(localStorage.getItem('memoryScores')||'[]');
      scores.sort((a,b)=>a.moves-b.moves||a.seconds-b.seconds);
      const list=document.getElementById('scoresList');
      if(scores.length===0){
        list.innerHTML=`<div class="no-scores"><div class="big">🏆</div>No scores yet — yebo, go play!</div>`;
        return;
      }
      const medals=['🥇','🥈','🥉'];
      list.innerHTML=scores.slice(0,50).map((s,i)=>`
        <div class="score-row ${s.name===currentUser?'mine':''}">
          <div class="rank ${i>=3?'number':''}">${i<3?medals[i]:`#${i+1}`}</div>
          <div class="player-name">${escHtml(s.name)}</div>
          <div class="score-date">${escHtml(s.date)}</div>
          <div class="pills">
            <span class="pill pill-moves">${s.moves} moves</span>
            <span class="pill pill-time">${formatTime(s.seconds)}</span>
          </div>
        </div>`).join('');
    }

    document.getElementById('clearBtn').addEventListener('click',()=>{
      if(!currentUser)return;
      const kept=JSON.parse(localStorage.getItem('memoryScores')||'[]').filter(s=>s.name!==currentUser);
      localStorage.setItem('memoryScores',JSON.stringify(kept));
      renderScores();
    });

    renderScores();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Game</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0c1826;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 16px 40px;
      color: #fff;
    }

    /* Top nav */
    .topnav {
      width: 100%;
      max-width: 640px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      min-height: 40px;
    }
    .nav-title {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -.2px;
    }
    .nav-title span { color: #62d84e; }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: rgba(255,255,255,.5);
      text-decoration: none;
      font-size: .82rem;
      font-weight: 600;
      padding: 6px 10px;
      border-radius: 8px;
      transition: color .2s, background .2s;
    }
    .nav-link:hover { color: #62d84e; background: rgba(98,216,78,.08); }

    .nav-player {
      font-size: .82rem;
      color: rgba(255,255,255,.45);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .nav-player strong { color: rgba(255,255,255,.8); }

    .btn-logout {
      background: none;
      border: none;
      color: rgba(255,255,255,.3);
      cursor: pointer;
      padding: 5px;
      font-size: .8rem;
      border-radius: 6px;
      transition: color .2s;
      line-height: 1;
    }
    .btn-logout:hover { color: #ff6b6b; }

    .divider {
      width: 100%;
      max-width: 640px;
      height: 1px;
      background: rgba(255,255,255,.06);
      margin-bottom: 16px;
    }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 18px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .stat { text-align: center; }
    .stat-label {
      font-size: .68rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: rgba(255,255,255,.4);
      margin-bottom: 2px;
    }
    .stat-value {
      font-size: 1.3rem;
      font-weight: 800;
      color: #62d84e;
    }

    /* Board — 4 cols × 3 rows for 12 cards */
    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      max-width: 640px;
      width: 100%;
    }

    /* Card */
    .card {
      aspect-ratio: 1;
      cursor: pointer;
      perspective: 600px;
      border-radius: 12px;
    }
    .card.matched { pointer-events: none; }
    .card.matched .card-inner {
      box-shadow: 0 0 0 3px #62d84e;
      border-radius: 12px;
    }

    .card-inner {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform .45s cubic-bezier(.4,0,.2,1);
      border-radius: 12px;
    }
    .card.flipped .card-inner,
    .card.matched .card-inner {
      transform: rotateY(180deg);
    }

    .card-back, .card-front {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
    }

    .card-back {
      background: #1a2f47;
      border: 2px solid rgba(98,216,78,.22);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-back svg {
      width: 38%;
      height: 38%;
      opacity: .3;
    }

    .card-front {
      transform: rotateY(180deg);
    }
    .card-front img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      image-orientation: from-image;
      pointer-events: none;
      user-select: none;
      display: block;
    }

    /* Restart button */
    .btn-restart {
      margin-top: 22px;
      padding: 11px 32px;
      background: #62d84e;
      color: #0c1826;
      border: none;
      border-radius: 100px;
      font-size: .93rem;
      font-weight: 800;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }
    .btn-restart:hover { background: #4ab038; }
    .btn-restart:active { transform: scale(.97); }

    /* Win overlay */
    .win-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(12,24,38,.88);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 16px;
    }
    .win-overlay.show { display: flex; }

    .win-card {
      background: #1a2f47;
      border: 2px solid #62d84e;
      border-radius: 24px;
      padding: 40px 40px 36px;
      text-align: center;
      max-width: 360px;
      width: 100%;
      animation: pop .4s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes pop {
      from { transform: scale(.7); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .win-emoji { font-size: 3.2rem; margin-bottom: 12px; }
    .win-card h2 { font-size: 1.75rem; font-weight: 800; margin-bottom: 6px; }
    .win-card h2 span { color: #62d84e; }
    .win-card p { color: rgba(255,255,255,.55); font-size: .9rem; margin-bottom: 22px; }

    .win-stats {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 16px;
    }
    .win-stat { text-align: center; }
    .win-stat-label { font-size: .68rem; text-transform: uppercase; letter-spacing: .1em; color: rgba(255,255,255,.4); }
    .win-stat-value { font-size: 1.5rem; font-weight: 800; color: #62d84e; }

    .win-rank {
      background: rgba(98,216,78,.08);
      border: 1px solid rgba(98,216,78,.25);
      border-radius: 12px;
      padding: 10px 16px;
      margin-bottom: 24px;
      font-size: .88rem;
      color: rgba(255,255,255,.6);
    }
    .win-rank strong { color: #62d84e; }

    .win-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .win-btn {
      padding: 12px 22px;
      border-radius: 100px;
      font-size: .9rem;
      font-weight: 800;
      cursor: pointer;
      border: none;
      transition: background .2s, transform .1s;
      text-decoration: none;
      display: inline-block;
    }
    .win-btn:active { transform: scale(.97); }
    .win-btn-green { background: #62d84e; color: #0c1826; }
    .win-btn-green:hover { background: #4ab038; }
    .win-btn-ghost { background: rgba(255,255,255,.1); color: rgba(255,255,255,.75); }
    .win-btn-ghost:hover { background: rgba(255,255,255,.16); color: #fff; }

    @media (max-width: 480px) {
      .board { gap: 6px; }
      .win-card { padding: 32px 20px 28px; }
      .win-card h2 { font-size: 1.4rem; }
      .nav-player { display: none; }
    }
  </style>
</head>
<body>

  <!-- Top nav -->
  <div class="topnav">
    <div class="nav-title">Memory <span>Game</span></div>
    <div class="nav-right">
      <a href="scores.html" class="nav-link">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
        Scores
      </a>
      <div class="nav-player" id="navPlayer"></div>
      <button class="btn-logout" id="logoutBtn" title="Change player">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>
  <div class="divider"></div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-label">Moves</div>
      <div class="stat-value" id="moves">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Pairs</div>
      <div class="stat-value" id="pairs">0 / 6</div>
    </div>
    <div class="stat">
      <div class="stat-label">Time</div>
      <div class="stat-value" id="timer">0:00</div>
    </div>
  </div>

  <div class="board" id="board"></div>

  <button class="btn-restart" id="restartBtn">New Game</button>

  <!-- Win overlay -->
  <div class="win-overlay" id="winOverlay">
    <div class="win-card">
      <div class="win-emoji">🎉</div>
      <h2>You <span>Win!</span></h2>
      <p>All pairs matched!</p>
      <div class="win-stats">
        <div class="win-stat">
          <div class="win-stat-label">Moves</div>
          <div class="win-stat-value" id="winMoves">—</div>
        </div>
        <div class="win-stat">
          <div class="win-stat-label">Time</div>
          <div class="win-stat-value" id="winTime">—</div>
        </div>
      </div>
      <div class="win-rank" id="winRank"></div>
      <div class="win-actions">
        <button class="win-btn win-btn-green" onclick="startGame()">Play Again</button>
        <a href="scores.html" class="win-btn win-btn-ghost">View Scores</a>
      </div>
    </div>
  </div>

  <script>
    // ── Auth ──
    const currentUser = localStorage.getItem('memoryUser');
    if (!currentUser) location.replace('login.html');

    document.getElementById('navPlayer').innerHTML =
      `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> <strong>${escHtml(currentUser)}</strong>`;

    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('memoryUser');
      location.replace('login.html');
    });

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── Photos — one per pair, shown in full (not sliced) ──
    const PHOTOS = [
      'photo1.jpg',
      'photo2.jpg',
      'photo3.jpg',
      'photo4.jpg',
      'photo5.jpg',
      'photo6.jpg',
    ];
    const TOTAL_PAIRS = PHOTOS.length; // 6

    // ── State ──
    let cards = [];
    let flipped = [];
    let matched = 0;
    let moves = 0;
    let locked = false;
    let timerInterval = null;
    let seconds = 0;
    let started = false;

    // ── DOM ──
    const board      = document.getElementById('board');
    const movesEl    = document.getElementById('moves');
    const pairsEl    = document.getElementById('pairs');
    const timerEl    = document.getElementById('timer');
    const winOverlay = document.getElementById('winOverlay');
    const winMovesEl = document.getElementById('winMoves');
    const winTimeEl  = document.getElementById('winTime');
    const winRankEl  = document.getElementById('winRank');

    function formatTime(s) {
      return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
    }

    function startTimer() {
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        seconds++;
        timerEl.textContent = formatTime(seconds);
      }, 1000);
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function startGame() {
      clearInterval(timerInterval);
      seconds = 0; moves = 0; matched = 0;
      flipped = []; locked = false; started = false;
      movesEl.textContent = '0';
      pairsEl.textContent = `0 / ${TOTAL_PAIRS}`;
      timerEl.textContent = '0:00';
      winOverlay.classList.remove('show');

      // Each photo appears twice → one pair per photo
      cards = shuffle(
        PHOTOS.flatMap((src, photoIdx) => [
          { photoIdx, src },
          { photoIdx, src },
        ])
      );
      renderBoard();
    }

    function renderBoard() {
      board.innerHTML = '';
      cards.forEach((card, idx) => {
        const el = document.createElement('div');
        el.className = 'card';
        el.dataset.idx = idx;
        el.innerHTML = `
          <div class="card-inner">
            <div class="card-back">
              <svg viewBox="0 0 24 24" fill="none" stroke="#62d84e" stroke-width="1.5">
                <path d="M3 17l4-8 4 4 4-6 4 10"/>
                <circle cx="18" cy="5" r="2" fill="#62d84e" stroke="none"/>
              </svg>
            </div>
            <div class="card-front">
              <img src="${card.src}"
                   alt="Memory card"
                   onerror="this.parentElement.style.background='#1a2f47'" />
            </div>
          </div>`;
        el.addEventListener('click', () => onCardClick(idx));
        board.appendChild(el);
      });
    }

    function onCardClick(idx) {
      if (locked) return;
      const el = board.querySelector(`[data-idx="${idx}"]`);
      if (!el || el.classList.contains('flipped') || el.classList.contains('matched')) return;

      if (!started) { started = true; startTimer(); }

      el.classList.add('flipped');
      flipped.push(idx);

      if (flipped.length === 2) {
        locked = true;
        moves++;
        movesEl.textContent = moves;
        checkMatch();
      }
    }

    function checkMatch() {
      const [a, b] = flipped;
      const isMatch = cards[a].photoIdx === cards[b].photoIdx;

      if (isMatch) {
        board.querySelector(`[data-idx="${a}"]`).classList.add('matched');
        board.querySelector(`[data-idx="${b}"]`).classList.add('matched');
        matched++;
        pairsEl.textContent = `${matched} / ${TOTAL_PAIRS}`;
        flipped = [];
        locked = false;

        if (matched === TOTAL_PAIRS) {
          clearInterval(timerInterval);
          setTimeout(() => { saveScore(); showWin(); }, 500);
        }
      } else {
        setTimeout(() => {
          board.querySelector(`[data-idx="${a}"]`).classList.remove('flipped');
          board.querySelector(`[data-idx="${b}"]`).classList.remove('flipped');
          flipped = [];
          locked = false;
        }, 900);
      }
    }

    function saveScore() {
      const today = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      const scores = JSON.parse(localStorage.getItem('memoryScores') || '[]');
      scores.push({ name: currentUser, moves, seconds, date: today });
      if (scores.length > 100) scores.splice(0, scores.length - 100);
      localStorage.setItem('memoryScores', JSON.stringify(scores));
    }

    function showWin() {
      winMovesEl.textContent = moves;
      winTimeEl.textContent  = formatTime(seconds);

      const scores = JSON.parse(localStorage.getItem('memoryScores') || '[]');
      scores.sort((a, b) => a.moves - b.moves || a.seconds - b.seconds);
      const rank  = scores.findIndex(s => s.name === currentUser && s.moves === moves && s.seconds === seconds) + 1;
      const total = scores.length;
      const medals = {1:'🥇', 2:'🥈', 3:'🥉'};
      winRankEl.innerHTML = rank <= 3
        ? `${medals[rank]} <strong>#${rank} on the leaderboard!</strong>`
        : `Your rank: <strong>#${rank}</strong> of ${total} scores`;

      winOverlay.classList.add('show');
    }

    document.getElementById('restartBtn').addEventListener('click', startGame);

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(renderBoard, 150);
    });

    startGame();
  </script>

</body>
</html>

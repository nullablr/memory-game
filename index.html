<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spirlini Memory</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:      #F40009;
      --red-dark: #b80007;
      --bg:       #180003;
      --card-bg:  #280008;
      --white:    #ffffff;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 48px;
      color: var(--white);
    }

    /* ── Header banner ── */
    .header {
      width: 100%;
      background: var(--red);
      padding: 14px 20px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }
    /* Ribbon wave decoration */
    .header::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 14px;
      background: var(--bg);
      clip-path: ellipse(52% 100% at 50% 100%);
    }

    .header-inner {
      width: 100%;
      max-width: 640px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-family: 'Pacifico', cursive;
      font-size: 1.75rem;
      color: var(--white);
      text-shadow: 2px 2px 4px rgba(0,0,0,.35);
      letter-spacing: .5px;
    }

    .nav-right { display: flex; align-items: center; gap: 8px; }
    .nav-link {
      display: inline-flex; align-items: center; gap: 5px;
      color: rgba(255,255,255,.8);
      text-decoration: none; font-size: .82rem; font-weight: 700;
      padding: 6px 12px; border-radius: 100px;
      background: rgba(255,255,255,.18);
      transition: background .2s;
    }
    .nav-link:hover { background: rgba(255,255,255,.3); }

    .nav-player {
      font-size: .8rem; color: rgba(255,255,255,.75);
      display: flex; align-items: center; gap: 4px;
    }
    .nav-player strong { color: #fff; }

    .btn-logout {
      background: rgba(255,255,255,.18); border: none;
      color: rgba(255,255,255,.8); cursor: pointer;
      padding: 6px 8px; border-radius: 100px;
      transition: background .2s; line-height: 1;
    }
    .btn-logout:hover { background: rgba(255,255,255,.3); }

    /* ── Stats ── */
    .stats {
      display: flex; gap: 28px;
      margin-bottom: 18px;
      flex-wrap: wrap; justify-content: center;
      padding: 0 16px;
    }
    .stat { text-align: center; }
    .stat-label {
      font-size: .65rem; text-transform: uppercase;
      letter-spacing: .12em; color: rgba(255,255,255,.45); margin-bottom: 2px;
    }
    .stat-value { font-size: 1.4rem; font-weight: 800; color: var(--red); }

    /* ── Board ── */
    .board {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      max-width: 640px;
      width: 100%;
      padding: 0 16px;
    }
    @media (max-width: 500px) {
      .board { grid-template-columns: repeat(4, 1fr); gap: 6px; }
    }

    /* ── Card ── */
    .card {
      aspect-ratio: 1; cursor: pointer;
      perspective: 600px; border-radius: 10px;
    }
    .card.matched { pointer-events: none; }
    .card.matched .card-inner {
      box-shadow: 0 0 0 3px #fff, 0 0 12px rgba(255,255,255,.4);
      border-radius: 10px;
    }

    .card-inner {
      width: 100%; height: 100%; position: relative;
      transform-style: preserve-3d;
      transition: transform .4s cubic-bezier(.4,0,.2,1);
      border-radius: 10px;
    }
    .card.flipped .card-inner,
    .card.matched .card-inner { transform: rotateY(180deg); }

    .card-back, .card-front {
      position: absolute; inset: 0; border-radius: 10px;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      overflow: hidden;
    }

    /* Coca-Cola red card back with wave */
    .card-back {
      background: var(--red);
      display: flex; align-items: center; justify-content: center;
    }
    .card-back svg { width: 80%; height: 80%; }

    .card-front { transform: rotateY(180deg); }
    .card-front img {
      width: 100%; height: 100%; object-fit: cover;
      image-orientation: from-image;
      pointer-events: none; user-select: none; display: block;
    }

    /* ── Buttons ── */
    .btn-restart {
      margin-top: 24px; padding: 12px 36px;
      background: var(--red); color: #fff;
      border: none; border-radius: 100px;
      font-size: .95rem; font-weight: 800; cursor: pointer;
      transition: background .2s, transform .1s;
      box-shadow: 0 4px 14px rgba(244,0,9,.4);
    }
    .btn-restart:hover { background: var(--red-dark); }
    .btn-restart:active { transform: scale(.97); }

    /* ── Win overlay ── */
    .win-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(20,0,3,.92);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      align-items: center; justify-content: center;
      z-index: 100; padding: 16px;
    }
    .win-overlay.show { display: flex; }

    .win-card {
      background: var(--card-bg);
      border: 2px solid var(--red);
      border-radius: 24px; padding: 36px 40px 32px;
      text-align: center; max-width: 360px; width: 100%;
      animation: pop .45s cubic-bezier(.34,1.56,.64,1);
      box-shadow: 0 0 40px rgba(244,0,9,.25);
    }
    @keyframes pop {
      from { transform: scale(.6); opacity: 0; }
      to   { transform: scale(1);  opacity: 1; }
    }

    /* ASCII heart */
    .ascii-heart {
      font-family: 'Courier New', Courier, monospace;
      font-size: 15px; line-height: 1.3;
      color: #ff2d55;
      text-shadow: 0 0 12px rgba(255,45,85,.8), 0 0 28px rgba(255,45,85,.4);
      display: inline-block; margin-bottom: 18px;
      animation: heartbeat 1.0s ease-in-out infinite;
      white-space: pre; letter-spacing: 2px;
    }
    @keyframes heartbeat {
      0%   { transform: scale(1);    }
      12%  { transform: scale(1.32); }
      24%  { transform: scale(1);    }
      36%  { transform: scale(1.16); }
      60%  { transform: scale(1);    }
      100% { transform: scale(1);    }
    }

    .win-card h2 {
      font-family: 'Pacifico', cursive;
      font-size: 2rem; font-weight: 400; margin-bottom: 6px; color: #fff;
    }
    .win-card h2 span { color: var(--red); }
    .win-card p { color: rgba(255,255,255,.5); font-size: .88rem; margin-bottom: 20px; }

    .win-stats { display: flex; gap: 20px; justify-content: center; margin-bottom: 14px; }
    .win-stat { text-align: center; }
    .win-stat-label { font-size: .65rem; text-transform: uppercase; letter-spacing: .12em; color: rgba(255,255,255,.4); }
    .win-stat-value { font-size: 1.4rem; font-weight: 800; color: var(--red); }

    .win-rank {
      background: rgba(244,0,9,.1); border: 1px solid rgba(244,0,9,.3);
      border-radius: 12px; padding: 9px 14px;
      margin-bottom: 22px; font-size: .86rem; color: rgba(255,255,255,.6);
    }
    .win-rank strong { color: var(--red); }

    .win-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .win-btn {
      padding: 11px 24px; border-radius: 100px;
      font-size: .9rem; font-weight: 800;
      cursor: pointer; border: none;
      transition: background .2s, transform .1s;
      text-decoration: none; display: inline-block;
    }
    .win-btn:active { transform: scale(.97); }
    .win-btn-red { background: var(--red); color: #fff; box-shadow: 0 3px 10px rgba(244,0,9,.4); }
    .win-btn-red:hover { background: var(--red-dark); }
    .win-btn-ghost { background: rgba(255,255,255,.1); color: rgba(255,255,255,.75); }
    .win-btn-ghost:hover { background: rgba(255,255,255,.18); color: #fff; }

    @media (max-width: 420px) {
      .win-card { padding: 28px 20px 24px; }
      .ascii-heart { font-size: 11px; }
      .nav-player { display: none; }
      .logo { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <!-- Header / nav -->
  <div class="header">
    <div class="header-inner">
      <div class="logo">Spirlini Memory</div>
      <div class="nav-right">
        <a href="scores.html" class="nav-link">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
          Scores
        </a>
        <div class="nav-player" id="navPlayer"></div>
        <button class="btn-logout" id="logoutBtn" title="Change player">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat"><div class="stat-label">Moves</div><div class="stat-value" id="moves">0</div></div>
    <div class="stat"><div class="stat-label">Pairs</div><div class="stat-value" id="pairs">0 / 10</div></div>
    <div class="stat"><div class="stat-label">Time</div><div class="stat-value" id="timer">0:00</div></div>
  </div>

  <div class="board" id="board"></div>
  <button class="btn-restart" id="restartBtn">New Game</button>

  <!-- Win overlay -->
  <div class="win-overlay" id="winOverlay">
    <div class="win-card">
      <pre class="ascii-heart"> ♥♥♥   ♥♥♥
♥♥♥♥♥♥♥♥♥♥♥
♥♥♥♥♥♥♥♥♥♥♥
♥♥♥♥♥♥♥♥♥♥♥
 ♥♥♥♥♥♥♥♥♥
  ♥♥♥♥♥♥♥
   ♥♥♥♥♥
    ♥♥♥
     ♥</pre>
      <h2>You <span>Win!</span></h2>
      <p>All 10 pairs matched!</p>
      <div class="win-stats">
        <div class="win-stat">
          <div class="win-stat-label">Moves</div>
          <div class="win-stat-value" id="winMoves">—</div>
        </div>
        <div class="win-stat">
          <div class="win-stat-label">Time</div>
          <div class="win-stat-value" id="winTime">—</div>
        </div>
      </div>
      <div class="win-rank" id="winRank"></div>
      <div class="win-actions">
        <button class="win-btn win-btn-red" onclick="startGame()">Play Again</button>
        <a href="scores.html" class="win-btn win-btn-ghost">View Scores</a>
      </div>
    </div>
  </div>

  <script>
    const currentUser = localStorage.getItem('memoryUser');
    if (!currentUser) location.replace('login.html');

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    document.getElementById('navPlayer').innerHTML =
      `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> <strong>${escHtml(currentUser)}</strong>`;

    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('memoryUser');
      location.replace('login.html');
    });

    // ── 10 full photos — one per pair ──
    const PHOTOS = [
      'photo02.jpg',
      'photo05.jpg',
      'photo06.jpg',
      'photo07.jpg',
      'photo08.jpg',
      'photo09.jpg',
      'photo11.jpg',
      'photo14.jpg',
      'photo15.jpg',
      'photo16.jpg',
    ];
    const TOTAL_PAIRS = PHOTOS.length; // 10

    let cards = [], flipped = [], matched = 0, moves = 0;
    let locked = false, started = false, timerInterval = null, seconds = 0;

    const board      = document.getElementById('board');
    const movesEl    = document.getElementById('moves');
    const pairsEl    = document.getElementById('pairs');
    const timerEl    = document.getElementById('timer');
    const winOverlay = document.getElementById('winOverlay');
    const winMovesEl = document.getElementById('winMoves');
    const winTimeEl  = document.getElementById('winTime');
    const winRankEl  = document.getElementById('winRank');

    function formatTime(s) { return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }
    function startTimer() {
      clearInterval(timerInterval);
      timerInterval = setInterval(() => { seconds++; timerEl.textContent = formatTime(seconds); }, 1000);
    }
    function shuffle(arr) {
      for (let i = arr.length-1; i > 0; i--) {
        const j = Math.floor(Math.random()*(i+1)); [arr[i],arr[j]] = [arr[j],arr[i]];
      }
      return arr;
    }

    function startGame() {
      clearInterval(timerInterval);
      seconds = 0; moves = 0; matched = 0;
      flipped = []; locked = false; started = false;
      movesEl.textContent = '0';
      pairsEl.textContent = `0 / ${TOTAL_PAIRS}`;
      timerEl.textContent = '0:00';
      winOverlay.classList.remove('show');
      cards = shuffle(PHOTOS.flatMap((src, photoIdx) => [{ photoIdx, src }, { photoIdx, src }]));
      renderBoard();
    }

    function renderBoard() {
      board.innerHTML = '';
      cards.forEach((card, idx) => {
        const el = document.createElement('div');
        el.className = 'card';
        el.dataset.idx = idx;
        el.innerHTML = `
          <div class="card-inner">
            <div class="card-back">
              <svg viewBox="0 0 100 60" fill="none">
                <path d="M5,18 C22,4 38,36 55,22 C72,8 88,18 95,14" stroke="rgba(255,255,255,.65)" stroke-width="4.5" stroke-linecap="round" fill="none"/>
                <path d="M5,30 C22,16 38,48 55,34 C72,20 88,30 95,26" stroke="rgba(255,255,255,.35)" stroke-width="3" stroke-linecap="round" fill="none"/>
                <path d="M5,42 C22,28 38,60 55,46 C72,32 88,42 95,38" stroke="rgba(255,255,255,.18)" stroke-width="2" stroke-linecap="round" fill="none"/>
              </svg>
            </div>
            <div class="card-front">
              <img src="${card.src}" alt="" onerror="this.parentElement.style.background='#280008'" />
            </div>
          </div>`;
        el.addEventListener('click', () => onCardClick(idx));
        board.appendChild(el);
      });
    }

    function onCardClick(idx) {
      if (locked) return;
      const el = board.querySelector(`[data-idx="${idx}"]`);
      if (!el || el.classList.contains('flipped') || el.classList.contains('matched')) return;
      if (!started) { started = true; startTimer(); }
      el.classList.add('flipped');
      flipped.push(idx);
      if (flipped.length === 2) { locked = true; moves++; movesEl.textContent = moves; checkMatch(); }
    }

    function checkMatch() {
      const [a, b] = flipped;
      if (cards[a].photoIdx === cards[b].photoIdx) {
        board.querySelector(`[data-idx="${a}"]`).classList.add('matched');
        board.querySelector(`[data-idx="${b}"]`).classList.add('matched');
        matched++;
        pairsEl.textContent = `${matched} / ${TOTAL_PAIRS}`;
        flipped = []; locked = false;
        if (matched === TOTAL_PAIRS) { clearInterval(timerInterval); setTimeout(() => { saveScore(); showWin(); }, 500); }
      } else {
        setTimeout(() => {
          board.querySelector(`[data-idx="${a}"]`).classList.remove('flipped');
          board.querySelector(`[data-idx="${b}"]`).classList.remove('flipped');
          flipped = []; locked = false;
        }, 900);
      }
    }

    function saveScore() {
      const today = new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
      const scores = JSON.parse(localStorage.getItem('memoryScores') || '[]');
      scores.push({ name: currentUser, moves, seconds, date: today });
      if (scores.length > 100) scores.splice(0, scores.length - 100);
      localStorage.setItem('memoryScores', JSON.stringify(scores));
    }

    function showWin() {
      winMovesEl.textContent = moves;
      winTimeEl.textContent  = formatTime(seconds);
      const scores = JSON.parse(localStorage.getItem('memoryScores') || '[]');
      scores.sort((a,b) => a.moves - b.moves || a.seconds - b.seconds);
      const rank  = scores.findIndex(s => s.name===currentUser && s.moves===moves && s.seconds===seconds) + 1;
      const medals = {1:'🥇',2:'🥈',3:'🥉'};
      winRankEl.innerHTML = rank <= 3
        ? `${medals[rank]} <strong>#${rank} on the leaderboard!</strong>`
        : `Your rank: <strong>#${rank}</strong> of ${scores.length} scores`;
      winOverlay.classList.add('show');
    }

    document.getElementById('restartBtn').addEventListener('click', startGame);
    let rt; window.addEventListener('resize', () => { clearTimeout(rt); rt = setTimeout(renderBoard, 150); });
    startGame();
  </script>
</body>
</html>

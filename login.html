<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Game — Sign In</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0c1826;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      color: #fff;
    }

    .card {
      background: #1a2f47;
      border: 2px solid rgba(98,216,78,.25);
      border-radius: 24px;
      padding: 44px 36px 40px;
      text-align: center;
      width: 100%;
      max-width: 400px;
      animation: fadeUp .4s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .icon {
      width: 72px; height: 72px;
      background: rgba(98,216,78,.1);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      border: 2px solid rgba(98,216,78,.2);
    }
    .icon svg { width: 34px; height: 34px; }

    h1 { font-size: 2rem; font-weight: 800; margin-bottom: 8px; letter-spacing: -.3px; }
    h1 span { color: #62d84e; }

    .subtitle {
      font-size: .9rem;
      color: rgba(255,255,255,.45);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    input {
      display: block;
      width: 100%;
      padding: 15px 18px;
      background: rgba(255,255,255,.06);
      border: 1.5px solid rgba(98,216,78,.25);
      border-radius: 14px;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s, background .2s;
      margin-bottom: 14px;
    }
    input::placeholder { color: rgba(255,255,255,.3); }
    input:focus {
      border-color: #62d84e;
      background: rgba(255,255,255,.09);
    }

    .error {
      font-size: .83rem;
      color: #ff6b6b;
      margin-bottom: 12px;
      min-height: 18px;
      text-align: left;
    }

    .btn-play {
      width: 100%;
      padding: 15px;
      background: #62d84e;
      color: #0c1826;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: background .2s, transform .1s;
      letter-spacing: .2px;
    }
    .btn-play:hover { background: #4ab038; }
    .btn-play:active { transform: scale(.97); }

    .scores-link {
      margin-top: 22px;
    }
    .scores-link a {
      color: rgba(255,255,255,.35);
      text-decoration: none;
      font-size: .85rem;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: color .2s;
    }
    .scores-link a:hover { color: #62d84e; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#62d84e" stroke-width="2" stroke-linecap="round">
        <rect x="3" y="3" width="7" height="7" rx="1.5"/>
        <rect x="14" y="3" width="7" height="7" rx="1.5"/>
        <rect x="3" y="14" width="7" height="7" rx="1.5"/>
        <rect x="14" y="14" width="7" height="7" rx="1.5"/>
      </svg>
    </div>
    <h1>Memory <span>Game</span></h1>
    <p class="subtitle">Enter your name to play and track your score on the leaderboard.</p>

    <form id="loginForm" novalidate>
      <input
        type="text"
        id="nameInput"
        placeholder="Your name"
        autocomplete="given-name"
        maxlength="24"
        autofocus
      />
      <div class="error" id="error"></div>
      <button type="submit" class="btn-play">Play Now</button>
    </form>

    <div class="scores-link">
      <a href="scores.html">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
        View High Scores
      </a>
    </div>
  </div>

  <script>
    if (localStorage.getItem('memoryUser')) location.replace('index.html');

    document.getElementById('loginForm').addEventListener('submit', e => {
      e.preventDefault();
      const name = document.getElementById('nameInput').value.trim();
      if (!name) {
        document.getElementById('error').textContent = 'Please enter your name.';
        return;
      }
      localStorage.setItem('memoryUser', name);
      location.replace('index.html');
    });

    document.getElementById('nameInput').addEventListener('input', () => {
      document.getElementById('error').textContent = '';
    });
  </script>
</body>
</html>
